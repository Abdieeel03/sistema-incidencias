<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Clases</title>
</head>
<body>
    <div class="container mt-4">
        <h1>Clases</h1>

        <button class="btn btn-success mb-3" onclick="openCreateModal()">Crear Clase</button>

        <table class="table table-bordered table-striped">
            <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Profesor</th>
                <th>Sección</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody id="classTable"></tbody>
        </table>
    </div>

    <div class="modal fade" id="classModal">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 id="modalTitle">Clase</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <form id="classForm">
                        <input type="hidden" id="classId">

                        <input type="text" id="name" class="form-control mb-2" placeholder="Nombre" required>
                        <textarea id="description" class="form-control mb-2" placeholder="Descripción"></textarea>

                        <select id="teacherId" class="form-control mb-2"></select>
                        <select id="sectionId" class="form-control mb-2"></select>
                    </form>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-success" onclick="saveClass()">Guardar</button>
                </div>

            </div>
        </div>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/classes.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
