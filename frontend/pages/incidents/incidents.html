<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <div class="container mt-4">
        <h1>Incidencias</h1>

        <button class="btn btn-success mb-3" onclick="openCreateModal()">Crear Incidencia</button>

        <table class="table table-bordered table-striped">
            <thead>
            <tr>
                <th>Título</th>
                <th>Descripción</th>
                <th>Estudiante</th>
                <th>Clase</th>
                <th>Reportado por</th>
                <th>Estado</th>
                <th>Fecha</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody id="incidentTable"></tbody>
        </table>
    </div>

    <!-- MODAL -->
    <div class="modal fade" id="incidentModal">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 id="modalTitle">Incidencia</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <form id="incidentForm">
                        <input type="hidden" id="incidentId">

                        <input type="text" id="title" class="form-control mb-2" placeholder="Título" required>
                        <textarea id="description" class="form-control mb-2" placeholder="Descripción" required></textarea>

                        <select id="studentId" class="form-control mb-2"></select>
                        <select id="classId" class="form-control mb-2"></select>
                        <select id="reportedBy" class="form-control mb-2"></select>

                        <select id="status" class="form-control mb-2">
                            <option value="abierta">Abierta</option>
                            <option value="en_proceso">En proceso</option>
                            <option value="cerrada">Cerrada</option>
                        </select>

                        <input type="datetime-local" id="incidentDate" class="form-control">
                    </form>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-success" onclick="saveIncident()">Guardar</button>
                </div>

            </div>
        </div>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/incidents.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
