<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Sections</title>
</head>
<body>

    <div class="container mt-4">
        <h1>Secciones</h1>

        <button class="btn btn-success mb-3" onclick="openCreateModal()">Crear Sección</button>

        <table class="table table-bordered">
            <thead>
            <tr>
                <th>Nombre</th>
                <th>Grado</th>
                <th>Capacidad</th>
                <th>Coordinador</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody id="sectionTable"></tbody>
        </table>
    </div>

    <div class="modal fade" id="sectionModal">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 id="modalTitle">Sección</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <form id="sectionForm">
                        <input type="hidden" id="sectionId">

                        <input type="text" id="name" class="form-control mb-2" placeholder="Nombre" required>
                        <input type="text" id="grade" class="form-control mb-2" placeholder="Grado" required>
                        <input type="number" id="capacity" class="form-control mb-2" placeholder="Capacidad" required>
                        <select id="coordinatorId" class="form-control mb-2"></select>
                    </form>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-success" onclick="saveSection()">Guardar</button>
                </div>

            </div>
        </div>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/sections.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
