<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Assignments</title>
</head>
<body>

<div class="container mt-4">
    <h1>Asignaciones</h1>

    <button class="btn btn-success mb-3" onclick="openCreateModal()">Nueva Asignación</button>

    <table class="table table-bordered">
        <thead>
        <tr>
            <th>Estudiante</th>
            <th>Sección</th>
            <th>Clase</th>
            <th>Asignado por</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody id="assignmentTable"></tbody>
    </table>
</div>

<div class="modal fade" id="assignmentModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 id="modalTitle">Asignación</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <form id="assignmentForm">

                    <select id="studentId" class="form-control mb-2"></select>
                    <select id="sectionId" class="form-control mb-2"></select>
                    <select id="classId" class="form-control mb-2"></select>
                    <select id="assignedById" class="form-control mb-2"></select>

                </form>
            </div>

            <div class="modal-footer">
                <button class="btn btn-success" onclick="saveAssignment()">Guardar</button>
            </div>

        </div>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/assignments.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
